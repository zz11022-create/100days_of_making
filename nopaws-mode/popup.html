<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoPaws Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.18);
      --glass-strong: rgba(255, 255, 255, 0.28);
      --glass-border: rgba(255, 255, 255, 0.34);
      --text-primary: rgba(28, 28, 30, 0.92);
      --text-secondary: rgba(60, 60, 67, 0.72);
      --accent: rgba(174, 175, 247, 0.82);
      --accent-strong: rgba(150, 154, 245, 0.95);
      --shadow-soft: 0 10px 30px rgba(78, 90, 140, 0.18);
      --shadow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.38);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 320px;
      min-height: 420px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.35) 22%, transparent 42%),
        radial-gradient(circle at top right, rgba(213,221,255,0.9) 0%, rgba(213,221,255,0.16) 24%, transparent 48%),
        radial-gradient(circle at bottom left, rgba(226,215,255,0.88) 0%, rgba(226,215,255,0.12) 26%, transparent 52%),
        linear-gradient(145deg, #edf3ff 0%, #dfe7ff 45%, #e9e4ff 100%);
    }

    body {
      padding: 18px;
      position: relative;
    }

    .background-blur {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.55), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(195,205,255,0.45), transparent 28%),
        radial-gradient(circle at 35% 85%, rgba(220,200,255,0.36), transparent 25%);
      filter: blur(20px);
      opacity: 0.95;
    }

    .shell {
      position: relative;
      z-index: 1;
      border-radius: var(--radius-xl);
      padding: 16px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.34) 0%,
        rgba(255,255,255,0.17) 100%
      );
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-soft), var(--shadow-inner);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .icon-orb {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.48) 0%,
        rgba(255,255,255,0.18) 100%
      );
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow:
        0 6px 20px rgba(120, 130, 180, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.5);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 4px 0 0 0;
      font-size: 12.5px;
      line-height: 1.35;
      color: var(--text-secondary);
    }

    .status-card {
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 14px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.13) 100%
      );
      border: 1px solid rgba(255,255,255,0.32);
      box-shadow:
        0 8px 22px rgba(120, 130, 180, 0.10),
        inset 0 1px 0 rgba(255,255,255,0.42);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .status-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(60, 60, 67, 0.58);
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .status-detail {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    .toggle-btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: rgba(25, 25, 28, 0.92);
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.68) 0%, rgba(255,255,255,0.3) 100%),
        linear-gradient(135deg, rgba(174,175,247,0.9), rgba(201,221,255,0.76));
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow:
        0 10px 24px rgba(130, 142, 200, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.68);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .toggle-btn:hover {
      transform: translateY(-1px);
      box-shadow:
        0 12px 28px rgba(130, 142, 200, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .toggle-btn:active {
      transform: scale(0.985);
    }

    .toggle-btn.on {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52) 0%, rgba(255,255,255,0.22) 100%),
        linear-gradient(135deg, rgba(160,175,255,0.95), rgba(212,228,255,0.72));
    }

    .info-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .pill {
      flex: 1;
      border-radius: 999px;
      padding: 10px 12px;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .footnote {
      margin-top: 16px;
      font-size: 11.5px;
      line-height: 1.45;
      color: rgba(60, 60, 67, 0.62);
      text-align: center;
      padding: 0 4px;
    }
  </style>
</head>
<body>
  <div class="background-blur"></div>

  <div class="shell">
    <div class="topbar">
      <div class="icon-orb">🐾</div>
      <div class="title-wrap">
        <h1 class="title">NoPaws Mode</h1>
        <p class="subtitle">Keep curious paws off your keyboard</p>
      </div>
    </div>

    <div class="status-card">
      <div class="status-label">Protection Status</div>
      <div class="status-value" id="statusValue">Off</div>
      <div class="status-detail" id="statusDetail">
        Keyboard input is currently unprotected.
      </div>
    </div>

    <button id="toggleBtn" class="toggle-btn">Enable Protection</button>

    <div class="info-row">
      <div class="pill">Web Input Guard</div>
      <div class="pill">Paw-Safe Mode</div>
    </div>

    <div class="footnote">
      A soft keyboard protection layer for moments when your cat decides to help.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
